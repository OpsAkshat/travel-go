apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: travel-go
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
    
      initContainers:
        - name: wait-for-db
          image: busybox
          command:
            [
              "sh",
              "-c",
              "until nc -z postgres 5432; do echo waiting for db; sleep 2; done;"
            ]

      containers:
        - name: backend
          image: crickplankton/travel-backend:latest

          
          imagePullPolicy: Always

          ports:
            - containerPort: 8000

        
          env:
            - name: ROOT_PREFIX
              value: "/api"

          envFrom:
            - secretRef:
                name: travel-go-secrets

          
          readinessProbe:
            httpGet:
              path: /api/docs
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /api/docs
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10

         
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: travel-go
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
  