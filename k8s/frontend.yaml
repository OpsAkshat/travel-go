apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: travel-go
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: crickplankton/travel-frontend:latest 
          ports:
            - containerPort: 80
          env:
            - name: _URL
              value: "/api" 
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: travel-go
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
  type: LoadBalancer
